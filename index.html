<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Registry</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap');
        .font-serif { font-family: 'Instrument Serif', serif; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // REPLACE THIS with your deployed Google Apps Script URL later
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwpEZyS46_gQ0E9ohEx8m0JwKcduqC7UVs_4jQh44RB2jxC2jB5U17-Er1A_-O2mMWQ/exec';

        function App() {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [claimingItem, setClaimingItem] = useState(null);
            const [claimForm, setClaimForm] = useState({ name: '', email: '' });
            const [submitting, setSubmitting] = useState(false);
            const [unclaimingItem, setUnclaimingItem] = useState(null);
            const [unclaimEmail, setUnclaimEmail] = useState('');
            const [unclaimError, setUnclaimError] = useState('');

            useEffect(() => {
                fetchItems();
            }, []);

            const fetchItems = async () => {
                if (GOOGLE_APPS_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                    // Mock data for demo mode (updated to lowercase keys to match your script)
                    setTimeout(() => {
                        setItems([
                            {
                                id: '1',
                                title: 'Stokke Tripp Trapp High Chair',
                                description: 'Adjustable high chair in Natural wood finish.',
                                imageUrl: 'https://images.unsplash.com/photo-1517705008128-361805f42e86?auto=format&fit=crop&q=80&w=800',
                                purchaseUrl: 'https://example.com/chair',
                                buyername: '',
                                buyeremail: ''
                            },
                            {
                                id: '2',
                                title: 'Organic Cotton Onesies',
                                description: 'Pack of 5 neutral colors, size 3-6 months.',
                                imageUrl: 'https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?auto=format&fit=crop&q=80&w=800',
                                purchaseUrl: 'https://example.com/onesies',
                                buyername: 'Aunt Sarah',
                                buyeremail: 'sarah@example.com'
                            },
                            {
                                id: '3',
                                title: 'Baby Bjorn Bouncer',
                                description: 'Ergonomic bouncer with natural rocking.',
                                imageUrl: 'https://images.unsplash.com/photo-1555252333-9f8e92e65df9?auto=format&fit=crop&q=80&w=800',
                                purchaseUrl: 'https://example.com/bouncer',
                                buyername: '',
                                buyeremail: ''
                            }
                        ]);
                        setLoading(false);
                    }, 1000);
                    return;
                }

                try {
                    const response = await fetch(`${GOOGLE_APPS_SCRIPT_URL}?action=getItems`);
                    const data = await response.json();
                    console.log("Fetched Items Data:", data); 
                    setItems(data);
                } catch (error) {
                    console.error("Error fetching items:", error);
                } finally {
                    setLoading(false);
                }
            };

            const handleClaimSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);

                if (GOOGLE_APPS_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                    setItems(items.map(item => 
                        item.id === claimingItem.id 
                            ? { ...item, buyername: claimForm.name, buyeremail: claimForm.email } 
                            : item
                    ));
                    setSubmitting(false);
                    setClaimingItem(null);
                    setClaimForm({ name: '', email: '' });
                    return;
                }

                try {
                    await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            action: 'claimItem',
                            id: claimingItem.id,
                            buyerName: claimForm.name,
                            buyerEmail: claimForm.email
                        }),
                    });
                    await fetchItems();
                    setClaimingItem(null);
                    setClaimForm({ name: '', email: '' });
                } catch (error) {
                    console.error("Error claiming:", error);
                } finally {
                    setSubmitting(false);
                }
            };

            const handleUnclaimSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                setUnclaimError('');

                if (GOOGLE_APPS_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                    if (unclaimingItem.buyeremail.toLowerCase() === unclaimEmail.toLowerCase()) {
                        setItems(items.map(item => 
                            item.id === unclaimingItem.id ? { ...item, buyername: '', buyeremail: '' } : item
                        ));
                        setUnclaimingItem(null);
                        setUnclaimEmail('');
                    } else {
                        setUnclaimError('Email does not match our records.');
                    }
                    setSubmitting(false);
                    return;
                }

                try {
                    const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            action: 'unclaimItem',
                            id: unclaimingItem.id,
                            email: unclaimEmail
                        }),
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        await fetchItems();
                        setUnclaimingItem(null);
                        setUnclaimEmail('');
                    } else {
                        setUnclaimError(result.message);
                    }
                } catch (error) {
                    setUnclaimError("Server error.");
                } finally {
                    setSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen bg-stone-50 text-stone-800 pb-20">
                    <header className="bg-white shadow-sm py-16 px-4 text-center">
                        <div className="max-w-3xl mx-auto">
                            <div className="text-4xl mb-4">💙</div>
                            <h1 className="text-5xl font-serif text-stone-800 mb-4 tracking-tight">Andrew & Maddie's Baby Registry</h1>
                            <p className="text-stone-500 text-lg">Thank you for spoiling our baby boy!</p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-12">
                        {loading ? (
                            <div className="flex justify-center items-center h-64">
                                <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-rose-400"></div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {items.map((item) => {
                                    // UPDATED: Using lowercase keys to match your console output
                                    const hasEmail = item.buyeremail && String(item.buyeremail).trim() !== '';
                                    const hasName = item.buyername && String(item.buyername).trim() !== '';
                                    const isClaimed = hasEmail || hasName;
                                    
                                    return (
                                        <div key={item.id} className="bg-white rounded-3xl shadow-sm overflow-hidden border border-stone-100 flex flex-col group transition-all">
                                            <div className="aspect-square relative overflow-hidden bg-stone-50">
                                                <img src={item.imageUrl} className={`w-full h-full object-cover transition-all duration-500 group-hover:scale-105 ${isClaimed ? 'opacity-40 grayscale' : ''}`} />
                                                {isClaimed && (
                                                    <div className="absolute inset-0 flex items-center justify-center bg-white/20 backdrop-blur-[2px]">
                                                        <div className="bg-white/90 px-6 py-3 rounded-full shadow-sm flex items-center gap-2 text-stone-600 font-medium border border-stone-100">
                                                            <span className="text-emerald-500">✅</span>
                                                            <span>Claimed</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                            <div className="p-8 flex flex-col flex-grow">
                                                <h3 className="text-xl font-semibold mb-2">{item.title}</h3>
                                                <p className="text-stone-500 text-sm mb-8 leading-relaxed line-clamp-2">{item.description}</p>
                                                <div className="mt-auto space-y-3">
                                                    <a href={item.purchaseUrl} target="_blank" className="flex items-center justify-center gap-2 w-full py-3 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-2xl transition-colors font-medium text-sm">
                                                        <span>🔗</span> View in Store
                                                    </a>
                                                    {!isClaimed ? (
                                                        <button onClick={() => setClaimingItem(item)} className="flex items-center justify-center gap-2 w-full py-3 bg-rose-400 hover:bg-rose-500 text-white rounded-2xl shadow-sm font-medium text-sm transition-colors">
                                                            <span>🎁</span> I Bought This
                                                        </button>
                                                    ) : (
                                                        <button onClick={() => setUnclaimingItem(item)} className="w-full py-3 text-stone-400 hover:text-rose-500 text-sm font-medium transition-colors">
                                                            Change of mind? Unclaim
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {claimingItem && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl">
                                <h2 className="text-3xl font-serif mb-6">Claim this gift</h2>
                                <form onSubmit={handleClaimSubmit} className="space-y-5">
                                    <div>
                                        <label className="block text-xs font-bold text-stone-400 uppercase tracking-widest mb-2">Your Name</label>
                                        <input type="text" required className="w-full px-5 py-4 rounded-2xl border border-stone-200 focus:ring-2 focus:ring-rose-300 outline-none" value={claimForm.name} onChange={(e) => setClaimForm({ ...claimForm, name: e.target.value })} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-stone-400 uppercase tracking-widest mb-2">Your Email</label>
                                        <input type="email" required className="w-full px-5 py-4 rounded-2xl border border-stone-200 focus:ring-2 focus:ring-rose-300 outline-none" value={claimForm.email} onChange={(e) => setClaimForm({ ...claimForm, email: e.target.value })} />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => setClaimingItem(null)} className="flex-1 py-4 bg-stone-100 rounded-2xl font-medium">Cancel</button>
                                        <button type="submit" disabled={submitting} className="flex-1 py-4 bg-rose-400 text-white rounded-2xl font-medium shadow-lg">Confirm</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {unclaimingItem && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl">
                                <h2 className="text-3xl font-serif mb-4">Unclaim Gift</h2>
                                <p className="text-stone-500 text-sm mb-6">Enter the email used to claim this item.</p>
                                <form onSubmit={handleUnclaimSubmit} className="space-y-5">
                                    <input type="email" required className="w-full px-5 py-4 rounded-2xl border border-stone-200 focus:ring-2 focus:ring-rose-300 outline-none" value={unclaimEmail} onChange={(e) => setUnclaimEmail(e.target.value)} />
                                    {unclaimError && <p className="text-rose-500 text-sm font-medium">{unclaimError}</p>}
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => { setUnclaimingItem(null); setUnclaimError(''); }} className="flex-1 py-4 bg-stone-100 rounded-2xl font-medium">Cancel</button>
                                        <button type="submit" disabled={submitting} className="flex-1 py-4 bg-stone-800 text-white rounded-2xl font-medium">Unclaim</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
