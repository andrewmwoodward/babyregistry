<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Registry</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap');
        .font-serif { font-family: 'Instrument Serif', serif; }
        body { font-family: 'Inter', sans-serif; }
        
        /* DESKTOP HOVER LOGIC */
        @media (hover: hover) {
            .description-expand {
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                transition: all 0.3s ease-in-out;
            }
            .group:hover .description-expand {
                -webkit-line-clamp: unset !important;
                display: block;
            }
        }

        /* MOBILE LOGIC */
        @media (hover: none) {
            .description-expand {
                display: block;
                -webkit-line-clamp: unset !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwpEZyS46_gQ0E9ohEx8m0JwKcduqC7UVs_4jQh44RB2jxC2jB5U17-Er1A_-O2mMWQ/exec';
        const ETRANSFER_EMAIL = 'TheAndrewWoodward@gmail.com';

        function App() {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [claimingItem, setClaimingItem] = useState(null);
            const [showFundModal, setShowFundModal] = useState(false);
            const [claimForm, setClaimForm] = useState({ name: '', email: '' });
            const [submitting, setSubmitting] = useState(false);
            const [unclaimingItem, setUnclaimingItem] = useState(null);
            const [unclaimEmail, setUnclaimEmail] = useState('');
            const [unclaimError, setUnclaimError] = useState('');

            useEffect(() => {
                fetchItems();
            }, []);

            const fetchItems = async () => {
                try {
                    const response = await fetch(`${GOOGLE_APPS_SCRIPT_URL}?action=getItems`);
                    const data = await response.json();
                    setItems(data);
                } catch (error) {
                    console.error("Error fetching items:", error);
                } finally {
                    setLoading(false);
                }
            };

            const handleClaimSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                try {
                    await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            action: 'claimItem',
                            id: claimingItem.id,
                            buyerName: claimForm.name,
                            buyerEmail: claimForm.email
                        }),
                    });
                    await fetchItems();
                    setClaimingItem(null);
                    setClaimForm({ name: '', email: '' });
                } catch (error) {
                    console.error("Error claiming:", error);
                } finally {
                    setSubmitting(false);
                }
            };

            const handleUnclaimSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                setUnclaimError('');
                try {
                    const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            action: 'unclaimItem',
                            id: unclaimingItem.id,
                            email: unclaimEmail
                        }),
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        await fetchItems();
                        setUnclaimingItem(null);
                        setUnclaimEmail('');
                    } else {
                        setUnclaimError(result.message || 'Email does not match.');
                    }
                } catch (error) {
                    console.error("Unclaim error:", error);
                    setUnclaimError("Server error.");
                } finally {
                    setSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen bg-stone-50 text-stone-800 pb-20">
                    <header className="bg-white shadow-sm py-16 px-4 text-center border-b border-stone-100">
                        <div className="max-w-3xl mx-auto">
                            <div className="text-4xl mb-4">💙</div>
                            <h1 className="text-5xl font-serif text-stone-800 mb-4 tracking-tight">Andrew & Maddie's Baby Registry</h1>
                            <p className="text-stone-500 text-lg">Thank you for spoiling our baby boy!</p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-12">
                        {loading ? (
                            <div className="flex justify-center items-center h-64">
                                <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-200"></div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 items-start">
                                {items.map((item) => {
                                    const isClaimed = (item.buyeremail && item.buyeremail.trim() !== '') || (item.buyername && item.buyername.trim() !== '');
                                    const isCashGift = (item.purchaseUrl?.toLowerCase().includes('fund') || 
                                                       item.purchaseUrl?.toLowerCase().includes('etransfer') ||
                                                       item.title?.toLowerCase().includes('fund'));

                                    return (
                                        <div key={item.id} className="bg-white rounded-3xl shadow-sm overflow-hidden border border-stone-100 flex flex-col group transition-all h-full hover:shadow-md">
                                            <div className="aspect-square relative overflow-hidden bg-stone-50 shrink-0">
                                                <img src={item.imageUrl} className={`w-full h-full object-cover transition-all duration-500 group-hover:scale-105 ${isClaimed && !isCashGift ? 'opacity-40 grayscale' : ''}`} />
                                                
                                                {isClaimed && !isCashGift && (
                                                    <div className="absolute inset-0 flex items-center justify-center bg-white/20 backdrop-blur-[2px]">
                                                        <div className="bg-white/90 px-6 py-3 rounded-full shadow-sm flex items-center gap-2 text-stone-600 font-medium border border-stone-100">
                                                            <span className="text-emerald-500">✅</span>
                                                            <span>Claimed</span>
                                                        </div>
                                                    </div>
                                                )}

                                                {isCashGift && (
                                                    <div className="absolute top-4 right-4">
                                                        <div className="bg-blue-50/90 text-blue-600 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider backdrop-blur-sm border border-blue-100 shadow-sm">
                                                            Cash Fund
                                                        </div>
                                                    </div>
                                                )}
                                            </div>

                                            <div className="p-8 flex flex-col flex-grow min-h-0">
                                                <h3 className="text-xl font-semibold mb-2">{item.title}</h3>
                                                <div className="mb-8 flex-grow">
                                                    <p className="text-stone-500 text-sm leading-relaxed description-expand transition-all duration-300">
                                                        {item.description}
                                                    </p>
                                                </div>

                                                <div className="mt-auto space-y-3">
                                                    {isCashGift ? (
                                                        <button 
                                                            onClick={() => setShowFundModal(true)}
                                                            className="flex items-center justify-center gap-2 w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-2xl shadow-sm font-medium text-sm transition-colors"
                                                        >
                                                            <span>💸</span> Contribute to Fund
                                                        </button>
                                                    ) : (
                                                        <>
                                                            <a href={item.purchaseUrl} target="_blank" className="flex items-center justify-center gap-2 w-full py-3 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-2xl transition-colors font-medium text-sm">
                                                                <span>🔗</span> View in Store
                                                            </a>
                                                            {!isClaimed ? (
                                                                <button onClick={() => setClaimingItem(item)} className="flex items-center justify-center gap-2 w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-2xl shadow-sm font-medium text-sm transition-colors">
                                                                    <span>🎁</span> I Plan To Buy This
                                                                </button>
                                                            ) : (
                                                                <button onClick={() => setUnclaimingItem(item)} className="w-full py-3 text-stone-400 hover:text-blue-400 text-sm font-medium transition-colors">
                                                                    Change of mind? Unclaim
                                                                </button>
                                                            )}
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Cash Fund Modal */}
                    {showFundModal && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl text-center">
                                <div className="text-4xl mb-4 text-blue-500">💸</div>
                                <h2 className="text-3xl font-serif mb-4">Cash Fund Contribution</h2>
                                <p className="text-stone-600 mb-6 leading-relaxed">
                                    If you would like to contribute, please send e-transfers to:
                                </p>
                                <div className="bg-stone-50 border border-stone-200 rounded-2xl p-4 mb-8 select-all cursor-pointer hover:border-blue-300 transition-colors">
                                    <span className="text-blue-700 font-mono font-bold text-lg">{ETRANSFER_EMAIL}</span>
                                </div>
                                <button 
                                    onClick={() => setShowFundModal(false)} 
                                    className="w-full py-4 bg-stone-100 hover:bg-stone-200 rounded-2xl font-medium transition-colors"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Claim Modal */}
                    {claimingItem && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl">
                                <h2 className="text-3xl font-serif mb-6">Claim this gift</h2>
                                <form onSubmit={handleClaimSubmit} className="space-y-5">
                                    <div>
                                        <label className="block text-xs font-bold text-stone-400 uppercase tracking-widest mb-2">Your Name</label>
                                        <input type="text" required className="w-full px-5 py-4 rounded-2xl border border-stone-200 focus:ring-2 focus:ring-blue-100 outline-none" value={claimForm.name} onChange={(e) => setClaimForm({ ...claimForm, name: e.target.value })} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-stone-400 uppercase tracking-widest mb-2">Your Email</label>
                                        <input type="email" required className="w-full px-5 py-4 rounded-2xl border border-stone-200 focus:ring-2 focus:ring-blue-100 outline-none" value={claimForm.email} onChange={(e) => setClaimForm({ ...claimForm, email: e.target.value })} />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => setClaimingItem(null)} className="flex-1 py-4 bg-stone-100 rounded-2xl font-medium">Cancel</button>
                                        <button type="submit" disabled={submitting} className="flex-1 py-4 bg-blue-100 text-blue-700 rounded-2xl font-medium shadow-lg disabled:opacity-50">
                                            {submitting ? 'Confirming...' : 'Confirm'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Unclaim Modal */}
                    {unclaimingItem && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl">
                                <h2 className="text-3xl font-serif mb-4">Unclaim Gift</h2>
                                <p className="text-stone-500 text-sm mb-6">Enter the email used to claim this item.</p>
                                <form onSubmit={handleUnclaimSubmit} className="space-y-5">
                                    <input 
                                        type="email" 
                                        required 
                                        className="w-full px-5 py-4 rounded-2xl border border-stone-200 focus:ring-2 focus:ring-blue-100 outline-none" 
                                        value={unclaimEmail} 
                                        onChange={(e) => {
                                            setUnclaimEmail(e.target.value);
                                            if(unclaimError) setUnclaimError('');
                                        }} 
                                    />
                                    {unclaimError && <p className="text-rose-500 text-sm font-medium">{unclaimError}</p>}
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => { setUnclaimingItem(null); setUnclaimError(''); }} className="flex-1 py-4 bg-stone-100 rounded-2xl font-medium">Cancel</button>
                                        <button type="submit" disabled={submitting} className="flex-1 py-4 bg-stone-800 text-white rounded-2xl font-medium disabled:opacity-50">
                                            {submitting ? 'Verifying...' : 'Unclaim'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
